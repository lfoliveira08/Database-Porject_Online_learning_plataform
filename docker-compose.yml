version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: OnlineLearningPlatform
    ports:
      - "3307:3306"
    volumes:
      - ./database/online_learning_platform.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DB_HOST: db
    ports:
      - "8000:80"
    volumes:
      - ./ui:/var/www/html
    depends_on:
      - db
